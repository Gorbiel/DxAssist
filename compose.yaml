name: dxassist

services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dxassist}
      POSTGRES_USER: ${POSTGRES_USER:-dxassist}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dxassist-local-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_EXPOSED_PORT:-5432}:5432"
    networks:
      - dxassist-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dxassist} -d ${POSTGRES_DB:-dxassist}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./dxassist-backend
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      ENVIRONMENT: dev
      SECRET_KEY: ${SECRET_KEY:-django-insecure-local-dev-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-dxassist}
      POSTGRES_USER: ${POSTGRES_USER:-dxassist}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dxassist-local-password}
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-backend,localhost,127.0.0.1}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      MIGRATE_MAX_ATTEMPTS: ${MIGRATE_MAX_ATTEMPTS:-5}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    networks:
      - dxassist-network
    volumes:
      - ./dxassist-backend:/app

  frontend:
    build:
      context: ./dxassist-frontend
      target: dev
    command: npm run dev
    environment:
      PORT: 3000
      BACKEND_URL: ${BACKEND_URL:-http://backend:8000}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - dxassist-network
    volumes:
      - ./dxassist-frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next

  scheduler:
    build: ./dxassist-scheduler
    container_name: dxassist-scheduler
    ports:
      - "8001:8001"
    networks:
      - dxassist-network
    depends_on:
      - dxassist-angiography
      - dxassist-screening
    restart: unless-stopped

  dxassist-angiography:
    build: ./models/dxassist-angiography
    container_name: dxassist-angiography
    ports:
      - "8002:8002"
    networks:
      - dxassist-network
    restart: unless-stopped

  dxassist-screening:
    build: ./models/dxassist-screening
    container_name: dxassist-screening
    ports:
      - "8003:8003"
    networks:
      - dxassist-network
    restart: unless-stopped

networks:
  dxassist-network:
    driver: bridge

volumes:
  postgres_data:
  frontend_node_modules:
  frontend_next:
