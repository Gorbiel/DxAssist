name: dxassist

services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dxassist}
      POSTGRES_USER: ${POSTGRES_USER:-dxassist}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dxassist-local-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dxassist} -d ${POSTGRES_DB:-dxassist}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./dxassist-backend
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      ENVIRONMENT: dev
      POSTGRES_DB: ${POSTGRES_DB:-dxassist}
      POSTGRES_USER: ${POSTGRES_USER:-dxassist}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dxassist-local-password}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DJANGO_DEBUG: "True"
      DJANGO_SETTINGS_MODULE: config.settings
      ALLOWED_HOSTS: "backend,localhost,127.0.0.1"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./dxassist-backend:/app

  frontend:
    build:
      context: ./dxassist-frontend
      target: dev
    command: npm run dev
    environment:
      PORT: 3000
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./dxassist-frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next

volumes:
  postgres_data:
  frontend_node_modules:
  frontend_next: