name: CI

on:
  push:
    branches: ["master", "production"]
  pull_request:
    branches: ["master", "production"]

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read

    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docker: ${{ steps.filter.outputs.docker }}
      workflows: ${{ steps.filter.outputs.workflows }}
      infra: ${{ steps.filter.outputs.infra }}

    steps:
      - uses: actions/checkout@v7

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - "dxassist-backend/**"
              - ".github/workflows/ci.yml"
            frontend:
              - "dxassist-frontend/**"
              - ".github/workflows/ci.yml"
            docker:
              - "compose.yaml"
              - "compose.yml"
              - "compose.prod.yaml"
              - "compose.prod.yml"
              - "**/Dockerfile"
              - "**/Dockerfile.*"
              - ".github/workflows/ci.yml"
            workflows:
              - ".github/workflows/**"
            infra:
              - "k8s/**"
              - ".github/workflows/ci.yml"

  backend:
    name: Backend lint and test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'

    permissions:
      contents: read

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: dxassist
          POSTGRES_USER: dxassist
          POSTGRES_PASSWORD: dxassist
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U dxassist -d dxassist"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: dxassist-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            dxassist-backend/pyproject.toml
            dxassist-backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint
        run: ruff check .

      - name: Verify formatting
        run: black --check .

      - name: Test
        env:
          DJANGO_SETTINGS_MODULE: config.settings
          POSTGRES_DB: dxassist_test
          POSTGRES_USER: dxassist
          POSTGRES_PASSWORD: dxassist
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          ENVIRONMENT: test
        run: pytest

  frontend:
    name: Frontend lint, typecheck and build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'

    permissions:
      contents: read

    defaults:
      run:
        working-directory: dxassist-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dxassist-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck --if-present

      - name: Build
        run: npm run build

  docker:
    name: Docker Compose build
    runs-on: ubuntu-latest
    needs: [changes, backend, frontend]
    if: |
      always() &&
      (
        needs.changes.outputs.docker == 'true' ||
        needs.changes.outputs.backend == 'true' ||
        needs.changes.outputs.frontend == 'true'
      )

    permissions:
      contents: read

    env:
      POSTGRES_DB: dxassist
      POSTGRES_USER: dxassist
      POSTGRES_PASSWORD: dxassist

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate development Compose config
        run: docker compose -f compose.yaml config

      - name: Build development services
        run: docker compose -f compose.yaml build

      - name: Validate production-like Compose config
        run: docker compose -f compose.yaml -f compose.prod.yaml config

      - name: Build production-like services
        run: docker compose -f compose.yaml -f compose.prod.yaml build

  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [changes, backend, frontend, docker]
    if: always()

    permissions:
      contents: read

    steps:
      - name: Check CI result
        run: |
          if [[ "${{ needs.backend.result }}" == "failure" || \
                "${{ needs.frontend.result }}" == "failure" || \
                "${{ needs.docker.result }}" == "failure" || \
                "${{ needs.backend.result }}" == "cancelled" || \
                "${{ needs.frontend.result }}" == "cancelled" || \
                "${{ needs.docker.result }}" == "cancelled" ]]; then
            echo "One or more required CI jobs failed or were cancelled."
            exit 1
          fi

          echo "CI passed."
